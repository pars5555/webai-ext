<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Web Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1b2e;
      color: #e2e8f0;
      padding: 0;
    }

    /* ── Header ─────────────────────────────────── */
    .popup-header {
      background: linear-gradient(135deg, #1e1f36, #252745);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    }

    .popup-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .popup-logo svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .popup-header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
    }

    .popup-header-text p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ── Body ────────────────────────────────────── */
    .popup-body {
      padding: 16px 20px;
    }

    /* ── Status Section ──────────────────────────── */
    .status-section {
      margin-bottom: 16px;
    }

    .status-section .section-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #252745;
      border-radius: 8px;
      border: 1px solid rgba(124, 58, 237, 0.15);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #4ade80;
    }

    .status-text {
      font-size: 12px;
      color: #cbd5e1;
    }

    /* ── Quick Actions ───────────────────────────── */
    .actions-section {
      margin-bottom: 16px;
    }

    .actions-section .section-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .btn-open-chat {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 16px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-open-chat:hover {
      background: linear-gradient(135deg, #8B5CF6, #7C3AED);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.35);
    }

    .btn-open-chat:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-open-chat svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── Page Toggle ─────────────────────────────── */
    .page-toggle-section {
      margin-bottom: 4px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid rgba(124, 58, 237, 0.12);
      border-bottom: 1px solid rgba(124, 58, 237, 0.12);
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .toggle-label-title {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
    }

    .toggle-label-host {
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #374151;
      border-radius: 24px;
      transition: background 0.25s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #7C3AED;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* ── Footer ──────────────────────────────────── */
    .popup-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid rgba(124, 58, 237, 0.1);
    }

    .settings-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #a78bfa;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      transition: color 0.2s;
    }

    .settings-link:hover {
      color: #c4b5fd;
    }

    .settings-link svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .version-text {
      font-size: 10px;
      color: #475569;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="popup-header">
    <div class="popup-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm4 0h-2v-6h2v6zm-2-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
    </div>
    <div class="popup-header-text">
      <h1>Claude Web Assistant</h1>
      <p>AI-powered page debugging</p>
    </div>
  </div>

  <div class="popup-body">

    <!-- Status -->
    <div class="status-section">
      <span class="section-label">Status</span>
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Checking...</span>
      </div>
    </div>

    <!-- Open Chat -->
    <div class="actions-section">
      <span class="section-label">Quick Actions</span>
      <button class="btn-open-chat" id="open-chat-btn">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
        Open Chat
      </button>
    </div>

    <!-- Per-page Toggle -->
    <div class="page-toggle-section">
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-label-title" id="toggle-title">Enable for this page</span>
          <span class="toggle-label-host" id="toggle-host"></span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="page-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="popup-footer">
    <button class="settings-link" id="settings-btn">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
      Settings
    </button>
    <span class="version-text" id="version-text">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
