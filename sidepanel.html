<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Auth Overlay -->
  <div class="claude-auth-overlay" id="claude-auth-overlay" style="display:none;">
    <div class="claude-auth-card">
      <div class="claude-auth-logo">
        <svg viewBox="0 0 24 24" width="32" height="32"><circle cx="12" cy="12" r="10" fill="none" stroke="#7C3AED" stroke-width="2"/><path d="M15.5 8.5c0 0-1.5-1-3.5-1s-3.5 1.5-3.5 3.5c0 1.5 1 2.5 2 3l1.5.5c1 .4 1.5 1 1.5 2 0 1.2-1 2-2.5 2s-3-.8-3.5-1" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 class="claude-auth-title">AI Web Assistant</h2>
      <p class="claude-auth-subtitle" id="claude-auth-subtitle">Sign in to start chatting</p>

      <!-- Auth Error -->
      <div class="claude-auth-error" id="claude-auth-error" style="display:none;"></div>
      <div class="claude-auth-success" id="claude-auth-success" style="display:none;"></div>

      <!-- OAuth Buttons -->
      <div class="claude-auth-oauth">
        <button class="claude-auth-btn claude-auth-btn-google" id="claude-oauth-google">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="claude-auth-btn claude-auth-btn-apple" id="claude-oauth-apple">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
        <button class="claude-auth-btn claude-auth-btn-github" id="claude-oauth-github">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          Continue with GitHub
        </button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="claude-panel-header" id="claude-panel-header">
    <div class="claude-panel-header-left">
      <div class="claude-panel-logo">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M15.5 8.5c0 0-1.5-1-3.5-1s-3.5 1.5-3.5 3.5c0 1.5 1 2.5 2 3l1.5.5c1 .4 1.5 1 1.5 2 0 1.2-1 2-2.5 2s-3-.8-3.5-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <select id="claude-model-select" title="Select model">
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5">Haiku 4.5</option>
      </select>
    </div>
    <div class="claude-panel-header-actions">
      <span class="claude-user-balance" id="claude-user-balance" style="display:none;font-size:11px;color:#8b5cf6;font-weight:600;padding:2px 6px;background:rgba(139,92,246,0.15);border-radius:4px;" title="Your balance"></span>
      <div class="claude-user-badge" id="claude-user-badge" style="display:none;" title="Click for account options">
        <span class="claude-user-badge-text" id="claude-user-badge-text"></span>
        <svg viewBox="0 0 24 24" width="12" height="12"><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
      </div>
      <button class="claude-header-btn" id="claude-clear-btn" title="Clear chat">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="claude-messages" id="claude-messages">
    <!-- Welcome message inserted by JS -->
  </div>

  <!-- Context meter -->
  <div class="claude-context-bar" id="claude-context-bar">
    <div class="claude-context-meter">
      <div class="claude-context-fill" id="claude-context-fill"></div>
    </div>
    <span class="claude-context-label" id="claude-context-label">100% remaining</span>
    <button class="claude-context-compact-btn" id="claude-compact-btn" title="Compact context">
      <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z" fill="currentColor"/></svg>
    </button>
  </div>

  <!-- Input -->
  <div class="claude-input-area">
    <div class="claude-input-main">
      <div class="claude-input-wrapper">
        <textarea id="claude-chat-input" placeholder="Ask about this page..." rows="1"></textarea>
      </div>
      <button id="claude-send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <!-- Attachments preview -->
    <div class="claude-attachments" id="claude-attachments" style="display:none;"></div>
    <!-- Bottom bar: tab context + upload -->
    <div class="claude-input-bottom">
      <button class="claude-input-action-btn" id="claude-upload-btn" title="Upload image or file">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" fill="currentColor"/></svg>
      </button>
      <div class="claude-tab-context" id="claude-tab-context">
        <svg viewBox="0 0 24 24" width="12" height="12"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
        <span id="claude-tab-context-label">No page</span>
      </div>
    </div>
    <input type="file" id="claude-file-input" accept="image/*,.pdf,.txt,.json,.csv,.xml,.html,.css,.js,.ts,.md" multiple style="display:none;">
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
