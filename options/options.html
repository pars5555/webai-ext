<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Assistant — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <div class="options-container">

    <!-- Header -->
    <header class="options-header">
      <div class="header-left">
        <div class="header-logo">
          <img src="../icons/wai-logo-text.svg" width="48" height="48" alt="wAi">
        </div>
        <div>
          <h1>AI Web Assistant</h1>
          <p class="version-label">Version <span id="ext-version">1.0.0</span></p>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="options-tabs">
      <button class="options-tab active" data-tab="settings">Settings</button>
      <button class="options-tab" data-tab="sessions">Sessions</button>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-content active">

    <!-- General Settings -->
    <section class="card">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        General Settings
      </h2>

      <div class="field-group toggle-field">
        <label>Dev Mode</label>
        <div class="toggle-row">
          <span class="toggle-desc">Use local server (localhost:3466) with auto-login</span>
          <label class="toggle-switch">
            <input type="checkbox" id="dev-mode-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="field-group" id="dev-user-group" style="display:none;">
        <label for="dev-user-select">Dev User</label>
        <select id="dev-user-select">
          <option value="">Enter credentials manually</option>
        </select>
      </div>

      <div class="field-group">
        <label for="model-select">Model</label>
        <select id="model-select">
          <optgroup label="Claude">
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          </optgroup>
          <optgroup label="Gemini">
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
          </optgroup>
        </select>
      </div>

      <div class="field-group">
        <label>Theme</label>
        <select id="theme-select">
          <option value="dark">Dark (Default)</option>
          <option value="light">Light</option>
        </select>
      </div>
    </section>

    <!-- Danger Zone -->
    <section class="card">
      <div class="danger-zone">
        <h3>Danger Zone</h3>
        <p>This will remove all saved settings and session data. This action cannot be undone.</p>
        <button class="btn btn-danger" id="reset-all-btn">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Reset All Settings
        </button>
      </div>
    </section>

    </div><!-- end tab-settings -->

    <!-- Sessions Tab -->
    <div id="tab-sessions" class="tab-content" style="display:none;">
      <section class="card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
          Chat Sessions
        </h2>
        <div style="margin-bottom:12px;">
          <select id="session-list" style="width:100%;padding:8px 12px;background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;">
            <option value="">Select a session...</option>
          </select>
        </div>
        <div id="session-chat" style="max-height:500px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);display:none;">
        </div>
        <p id="session-empty" class="toggle-desc" style="text-align:center;padding:20px;">Select a session to view chat history</p>
      </section>
    </div><!-- end tab-sessions -->

  </div>

  <script src="options.js"></script>
</body>
</html>
