<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Assistant — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <div class="options-container">

    <!-- Header -->
    <header class="options-header">
      <div class="header-left">
        <div class="header-logo">
          <img src="../icons/wai-logo-text.svg" width="48" height="48" alt="wAi">
        </div>
        <div>
          <h1>AI Web Assistant</h1>
          <p class="version-label">Version <span id="ext-version">1.0.0</span></p>
        </div>
      </div>
    </header>

    <!-- General Settings -->
    <section class="card">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        General Settings
      </h2>

      <div class="field-group toggle-field">
        <label>Dev Mode</label>
        <div class="toggle-row">
          <span class="toggle-desc">Use local server (localhost:3466) with auto-login</span>
          <label class="toggle-switch">
            <input type="checkbox" id="dev-mode-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="field-group">
        <label for="model-select">Model</label>
        <select id="model-select">
          <option value="claude-opus-4-6">Claude Opus 4 (claude-opus-4-6)</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4 (claude-sonnet-4-6)</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (claude-haiku-4-5-20251001)</option>
        </select>
      </div>

      <div class="field-group">
        <label>Theme</label>
        <select id="theme-select">
          <option value="dark">Dark (Default)</option>
          <option value="light">Light</option>
        </select>
      </div>
    </section>

    <!-- Danger Zone -->
    <section class="card">
      <div class="danger-zone">
        <h3>Danger Zone</h3>
        <p>This will remove all saved settings and session data. This action cannot be undone.</p>
        <button class="btn btn-danger" id="reset-all-btn">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Reset All Settings
        </button>
      </div>
    </section>

  </div>

  <script src="options.js"></script>
</body>
</html>
