<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="45%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.22)"/>
      <stop offset="40%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#DDD6FE"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <radialGradient id="orb" cx="30%" cy="25%" r="65%">
      <stop offset="0%" style="stop-color:rgba(196,181,253,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(196,181,253,0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Orb glows -->
  <circle cx="38" cy="32" r="50" fill="url(#orb)"/>
  <circle cx="95" cy="100" r="40" fill="url(#orb2)"/>
  <!-- Subtle border -->
  <rect width="126" height="126" x="1" y="1" rx="27" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- WebAI text - single line, large -->
  <text x="64" y="82" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, Helvetica, sans-serif" font-weight="900" font-size="38" filter="url(#textShadow)" letter-spacing="-1">
    <tspan fill="url(#webGrad)">Web</tspan><tspan fill="url(#aiGrad)">AI</tspan>
  </text>
</svg>
